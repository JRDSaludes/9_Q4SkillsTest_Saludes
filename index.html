<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f5f5;
}

/* centered login box */
.login-container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* login card */
.login-box {
    width: 400px;
    padding: 30px;
    border-radius: 15px;
    background-color: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* header bar style like notebooks */
.header {
    background-color: #1e2a38;
    color: white;
    padding: 15px;
    text-align: center;
    border-radius: 10px 10px 0 0;
    margin: -30px -30px 20px -30px;
}

input {
    border-radius: 8px !important;
}

.btn-custom {
    width: 100%;
    margin-top: 10px;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <div class="header">
            <h4>OBMC Portal Login</h4>
        </div>

        <p class="text-center">Sign in to access your notebooks</p>

        <input id="username" type="text" class="form-control" placeholder="Username"><br>

        <input id="password" type="password" class="form-control" placeholder="Password"><br>

        <button class="btn btn-success btn-custom" onclick="login()">Login</button>

        <button class="btn btn-secondary btn-custom" onclick="clearFields()">Clear</button>

    </div>

</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (!user || !pass) {
        alert("Please fill in all fields");
        return;
    }

    if (user === "RennSantosPogi" && pass === "GiveBonusPoints") {
        localStorage.setItem("loggedIn", "yes");
        window.location.href = "notebooks.html";
    } else {
        alert("Incorrect username or password");
    }
}

function clearFields() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>
</html>
